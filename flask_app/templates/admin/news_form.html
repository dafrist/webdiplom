{% extends 'base.html' %}
{% block title %}Новость — Админ{% endblock %}
{% block content %}<section class="section section-alt"><div class="container"><h1 class="page-title">{{ 'Редактировать' if item else 'Добавить' }} новость</h1><div class="form-card"><form method="post"><div class="field"><label>Заголовок</label><input name="title" value="{{ item.title if item else '' }}" required></div><div class="field"><label>Slug</label><input name="slug" value="{{ item.slug if item else '' }}" required></div><div class="field"><label>Анонс</label><textarea name="teaser">{{ item.teaser if item else '' }}</textarea></div><div class="field"><label>Текст</label><textarea name="body">{{ item.body if item else '' }}</textarea></div><label><input type="checkbox" name="is_published" {% if not item or item.is_published %}checked{% endif %}> Опубликовано</label><br><button class="btn btn-full" type="submit">Сохранить</button><a class="btn btn-outline" href="{{ url_for('admin_news') }}">Отмена</a></form></div></div></section>{% endblock %}
